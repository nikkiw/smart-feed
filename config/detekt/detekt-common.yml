# Shared Detekt configuration. Layered tasks add one profile on top:
# detekt-domain.yml, detekt-data.yml, detekt-ui.yml, detekt-test.yml, or detekt-android-test.yml.

complexity:
  TooManyFunctions:
    active: false
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
  LongMethod:
    active: true
    allowedLines: 80
  LargeClass:
    active: true
    allowedLines: 250

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludeClassPattern: '.*Test$'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    active: true
    allowedNames: '(_|ignored|expected)'
  UnusedPrivateProperty:
    active: true
    allowedNames: '(_|ignored|expected)'
  UnusedVariable:
    active: true
    allowedNames: '(_|ignored|expected)'
  FunctionOnlyReturningConstant:
    active: false

performance:
  SpreadOperator:
    active: false
