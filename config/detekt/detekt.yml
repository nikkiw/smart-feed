# Compatibility entry point for the Detekt Gradle plugin default lookup.
# Layered tasks use detekt-common.yml plus a source-set/layer profile.

complexity:
  TooManyFunctions:
    active: false
  LongParameterList:
    active: true
    functionThreshold: 8 # Compose functions often have more parameters
    constructorThreshold: 8
  LongMethod:
    active: true
    threshold: 80
  LargeClass:
    active: true
    threshold: 250

naming:
  FunctionNaming:
    active: true
    # Allow uppercase starting letters for Compose @Composable functions
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludeClassPattern: '.*Test$'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false # Disabled as magic numbers are frequent in UI and animations
  WildcardImport:
    active: false # Formatting is handled by Spotless/KtLint anyway
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected)'
  FunctionOnlyReturningConstant:
    active: false

performance:
  SpreadOperator:
    active: false # Spread operator is sometimes unavoidable
