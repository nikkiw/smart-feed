# Android instrumentation tests are integration-heavy and commonly need larger setup code.

complexity:
  LongParameterList:
    active: false
  LongMethod:
    active: true
    allowedLines: 220
  LargeClass:
    active: true
    allowedLines: 900

naming:
  FunctionNaming:
    active: true
    functionPattern: '([a-zA-Z][a-zA-Z0-9]*)|(`.*`)'
    excludeClassPattern: '.*Test$'

style:
  MagicNumber:
    active: false
